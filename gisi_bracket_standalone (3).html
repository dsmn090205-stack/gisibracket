<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GISI Team Playoffs — Bracket Pool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --fairway: #223828;
    --fairway-deep: #172a1e;
    --sand: #e6dcc3;
    --cream: #f6f2e6;
    --flag: #b33a2e;
    --pin-gold: #c9a24b;
    --ink: #1c2419;
    --line: #3d5442;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--sand); }
  body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 24px 12px; }

  #gisi-root {
    background: var(--cream);
    color: var(--ink);
    padding: 28px 18px 60px;
    border-radius: 10px;
    max-width: 780px;
    width: 100%;
    box-shadow: 0 8px 30px rgba(23,42,30,0.15);
  }

  .g-setup-banner {
    background: var(--flag);
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 12.5px;
    padding: 14px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .g-setup-banner a { color: #fff; }
  .g-setup-banner code {
    background: rgba(255,255,255,0.18);
    padding: 2px 6px;
    border-radius: 4px;
    word-break: break-all;
  }

  .g-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--flag);
    margin: 0 0 6px;
  }

  .g-title {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 800;
    font-size: clamp(30px, 5vw, 46px);
    line-height: 0.95;
    letter-spacing: -0.01em;
    color: var(--fairway-deep);
    margin: 0 0 4px;
    text-transform: uppercase;
  }

  .g-sub {
    font-size: 14px;
    color: #5c6b5c;
    margin: 0 0 22px;
    max-width: 520px;
  }

  .g-tabs {
    display: flex;
    gap: 2px;
    background: var(--line);
    border-radius: 999px;
    padding: 3px;
    width: fit-content;
    margin-bottom: 26px;
  }

  .g-tab {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 9px 18px;
    border: none;
    background: transparent;
    color: var(--cream);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .g-tab.active {
    background: var(--pin-gold);
    color: var(--fairway-deep);
    font-weight: 700;
  }

  .g-panel { display: none; }
  .g-panel.active { display: block; }

  .g-name-row {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
    flex-wrap: wrap;
    align-items: center;
  }

  .g-name-row input {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border: 1.5px solid var(--line);
    border-radius: 6px;
    background: #fff;
    min-width: 220px;
  }

  .g-name-row input:focus { outline: 2px solid var(--pin-gold); border-color: var(--pin-gold); }

  .g-bracket {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    align-items: center;
  }

  @media (max-width: 640px) {
    .g-bracket { grid-template-columns: 1fr; }
  }

  .g-round-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fairway);
    text-align: center;
    margin-bottom: 10px;
    border-bottom: 2px dashed var(--line);
    padding-bottom: 8px;
  }

  .g-col { display: flex; flex-direction: column; gap: 22px; }

  .g-matchup {
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }

  .g-slot {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    cursor: pointer;
    border-bottom: 1px solid #e5ddc8;
    transition: background 0.15s;
    font-size: 13.5px;
  }

  .g-slot:last-child { border-bottom: none; }
  .g-slot:hover { background: #f4efdf; }

  .g-slot.picked {
    background: var(--fairway);
    color: var(--cream);
    font-weight: 600;
  }

  .g-slot.disabled { cursor: default; opacity: 0.45; }
  .g-slot.disabled:hover { background: #fff; }

  .g-seed {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--pin-gold);
    color: var(--fairway-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-weight: 700;
  }

  .g-slot.picked .g-seed { background: var(--cream); }

  .g-bye-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9.5px;
    color: #9a8f6f;
    margin-left: auto;
    letter-spacing: 0.05em;
  }

  .g-champ-box {
    margin-top: 24px;
    background: var(--fairway-deep);
    border-radius: 8px;
    padding: 18px;
    text-align: center;
  }

  .g-champ-label {
    font-family: 'Space Mono', monospace;
    color: var(--pin-gold);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .g-champ-name {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--cream);
    text-transform: uppercase;
  }

  .g-submit-btn {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--flag);
    color: #fff;
    border: none;
    padding: 12px 22px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 20px;
    font-weight: 700;
    transition: opacity 0.15s;
  }

  .g-submit-btn:hover { opacity: 0.88; }
  .g-submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .g-status {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
    color: var(--fairway);
  }

  .g-lb-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  .g-lb-table th {
    font-family: 'Space Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: left;
    color: #6c7a63;
    padding: 8px 10px;
    border-bottom: 2px solid var(--line);
  }
  .g-lb-table td {
    padding: 10px;
    border-bottom: 1px solid #e5ddc8;
    font-size: 13.5px;
  }
  .g-lb-table tr:hover td { background: #f4efdf; }
  .g-pts { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--fairway-deep); }

  .g-admin {
    margin-top: 34px;
    border-top: 2px dashed var(--line);
    padding-top: 18px;
  }

  .g-admin summary {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    color: #7a8570;
  }

  .g-admin-body { margin-top: 14px; }

  .g-empty {
    font-size: 13.5px;
    color: #8a8570;
    font-style: italic;
    padding: 20px 0;
  }
</style>
</head>
<body>

<div id="gisi-root">
  <div id="g-setup-banner-slot"></div>

  <p class="g-eyebrow">GISI &middot; Team Playoffs</p>
  <h1 class="g-title">Bracket Pool</h1>
  <p class="g-sub">Six teams, two byes. Pick your winners round by round, submit your card, then check the leaderboard once results are in.</p>

  <div class="g-tabs">
    <button class="g-tab active" data-tab="picks">Make Picks</button>
    <button class="g-tab" data-tab="leaderboard">Leaderboard</button>
  </div>

  <div class="g-panel active" id="panel-picks">
    <div class="g-name-row">
      <input id="g-entrant-name" type="text" placeholder="Your name" maxlength="30" />
      <span class="g-status" id="g-load-status"></span>
    </div>

    <div class="g-bracket" id="g-bracket-grid"></div>

    <div class="g-champ-box">
      <div class="g-champ-label">Your Champion</div>
      <div class="g-champ-name" id="g-champ-display">— make your picks —</div>
    </div>

    <button class="g-submit-btn" id="g-submit-btn" disabled>Submit My Bracket</button>
    <div class="g-status" id="g-submit-status"></div>

    <details class="g-admin">
      <summary>League Commissioner: enter actual results</summary>
      <div class="g-admin-body" id="g-admin-body"></div>
    </details>
  </div>

  <div class="g-panel" id="panel-leaderboard">
    <div id="g-lb-content"><p class="g-empty">Loading entries…</p></div>
  </div>
</div>

<script>
(function () {
  const TEAMS = {
    1: "Liquid Mechanix",
    2: "Birdie Brotherhood",
    3: "Swingers",
    4: "6 Aces",
    5: "Old Fashioned",
    6: "Frozen Flock"
  };

  const R1_GAMES = [
    { id: "r1_45", seedA: 4, seedB: 5 },
    { id: "r1_36", seedA: 3, seedB: 6 }
  ];
  const SEMI_GAMES = [
    { id: "semi_1", byeSeed: 1, feedsFrom: "r1_45" },
    { id: "semi_2", byeSeed: 2, feedsFrom: "r1_36" }
  ];

  let picks = { r1_45: null, r1_36: null, semi_1: null, semi_2: null, final: null };

  // ---------- Free anonymous JSON storage (kvdb.io) ----------
  // The shared pool data (all entries + actual results) lives under one key
  // inside a kvdb.io "bucket". The bucket ID is carried in the URL as
  // ?pool=<id> so every visitor points at the same shared data. If no
  // ?pool= is present, this page creates a fresh bucket on the spot and
  // redirects to itself with the ID attached — that redirected URL is the
  // one to copy and share with the league.
  const KVDB_BASE = "https://kvdb.io";
  const params = new URLSearchParams(window.location.search);
  let poolId = params.get("pool");

  function showErrorBanner(context, err) {
    const slot = document.getElementById("g-setup-banner-slot");
    slot.innerHTML = `<div class="g-setup-banner" style="background:#7a2318;">
      ⚠️ SOMETHING WENT WRONG (${context})<br/>
      ${(err && err.message) ? err.message : String(err)}<br/>
      Screenshot this banner and send it back for troubleshooting.
    </div>`;
  }

  async function ensurePool() {
    if (poolId) return poolId;
    let newId;
    try {
      const createRes = await fetch(`${KVDB_BASE}/`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "email=" + encodeURIComponent("gisi-bracket-pool@example.com")
      });
      if (!createRes.ok) throw new Error(`Bucket create failed: HTTP ${createRes.status}`);
      newId = (await createRes.text()).trim();
      if (!newId) throw new Error("Bucket create returned an empty ID");

      const initRes = await fetch(`${KVDB_BASE}/${newId}/data`, {
        method: "PUT",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ entries: {}, actualResults: {} })
      });
      if (!initRes.ok) throw new Error(`Bucket init failed: HTTP ${initRes.status}`);
    } catch (err) {
      showErrorBanner("creating shared pool", err);
      throw err;
    }
    const url = new URL(window.location.href);
    url.searchParams.set("pool", newId);
    window.location.replace(url.toString());
    // page will reload with ?pool=, so nothing else runs after this
    return null;
  }

  async function getPoolData() {
    const res = await fetch(`${KVDB_BASE}/${poolId}/data`);
    if (!res.ok) throw new Error(`Could not load pool data: HTTP ${res.status}`);
    const text = await res.text();
    return JSON.parse(text);
  }

  async function savePoolData(data) {
    const res = await fetch(`${KVDB_BASE}/${poolId}/data`, {
      method: "PUT",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`Could not save pool data: HTTP ${res.status}`);
  }

  function showSetupBanner() {
    const slot = document.getElementById("g-setup-banner-slot");
    const shareUrl = window.location.href;
    slot.innerHTML = `<div class="g-setup-banner">
      ⚠️ SETUP LINK CREATED — this page just made a fresh shared pool.<br/>
      Copy <strong>this exact URL</strong> (with the ?pool= part) and send THAT to your league —
      not the plain link without it:<br/>
      <code>${shareUrl}</code>
    </div>`;
  }

  // ---------- Bracket UI (unchanged logic) ----------
  function teamSlot(seed, gameId, disabled) {
    const div = document.createElement("div");
    div.className = "g-slot" + (disabled ? " disabled" : "");
    div.innerHTML = `<span class="g-seed">${seed}</span><span>${TEAMS[seed]}</span>`;
    if (!disabled) {
      div.addEventListener("click", () => selectWinner(gameId, seed));
    }
    div.dataset.seed = seed;
    div.dataset.game = gameId;
    return div;
  }

  function selectWinner(gameId, seed) {
    picks[gameId] = seed;
    if (gameId === "r1_45" && picks.semi_1 && picks.semi_1 !== 1 && picks.semi_1 !== seed) {
      picks.semi_1 = null;
    }
    if (gameId === "r1_36" && picks.semi_2 && picks.semi_2 !== 2 && picks.semi_2 !== seed) {
      picks.semi_2 = null;
    }
    if (picks.final && picks.final !== picks.semi_1 && picks.final !== picks.semi_2) {
      picks.final = null;
    }
    render();
  }

  function render() {
    const grid = document.getElementById("g-bracket-grid");
    grid.innerHTML = "";

    const col1 = document.createElement("div");
    col1.innerHTML = `<div class="g-round-label">Round 1</div>`;
    const col1games = document.createElement("div");
    col1games.className = "g-col";
    R1_GAMES.forEach(g => {
      const box = document.createElement("div");
      box.className = "g-matchup";
      const slotA = teamSlot(g.seedA, g.id, false);
      const slotB = teamSlot(g.seedB, g.id, false);
      if (picks[g.id] === g.seedA) slotA.classList.add("picked");
      if (picks[g.id] === g.seedB) slotB.classList.add("picked");
      box.appendChild(slotA);
      box.appendChild(slotB);
      col1games.appendChild(box);
    });
    col1.appendChild(col1games);
    grid.appendChild(col1);

    const col2 = document.createElement("div");
    col2.innerHTML = `<div class="g-round-label">Semifinals</div>`;
    const col2games = document.createElement("div");
    col2games.className = "g-col";
    SEMI_GAMES.forEach(g => {
      const box = document.createElement("div");
      box.className = "g-matchup";
      const byeSlot = teamSlot(g.byeSeed, g.id, false);
      byeSlot.querySelector("span:last-child").insertAdjacentHTML("afterend", '<span class="g-bye-tag">BYE</span>');
      if (picks[g.id] === g.byeSeed) byeSlot.classList.add("picked");
      box.appendChild(byeSlot);

      const opponentSeed = picks[g.feedsFrom];
      let oppSlot;
      if (opponentSeed) {
        oppSlot = teamSlot(opponentSeed, g.id, false);
        if (picks[g.id] === opponentSeed) oppSlot.classList.add("picked");
      } else {
        oppSlot = document.createElement("div");
        oppSlot.className = "g-slot disabled";
        oppSlot.innerHTML = `<span class="g-seed">?</span><span>Winner of Round 1</span>`;
      }
      box.appendChild(oppSlot);
      col2games.appendChild(box);
    });
    col2.appendChild(col2games);
    grid.appendChild(col2);

    const col3 = document.createElement("div");
    col3.innerHTML = `<div class="g-round-label">Final</div>`;
    const col3games = document.createElement("div");
    col3games.className = "g-col";
    const finalBox = document.createElement("div");
    finalBox.className = "g-matchup";
    const finalists = [picks.semi_1, picks.semi_2];
    finalists.forEach(seed => {
      let slot;
      if (seed) {
        slot = teamSlot(seed, "final", false);
        if (picks.final === seed) slot.classList.add("picked");
      } else {
        slot = document.createElement("div");
        slot.className = "g-slot disabled";
        slot.innerHTML = `<span class="g-seed">?</span><span>Winner of Semis</span>`;
      }
      finalBox.appendChild(slot);
    });
    col3games.appendChild(finalBox);
    col3.appendChild(col3games);
    grid.appendChild(col3);

    document.getElementById("g-champ-display").textContent = picks.final ? TEAMS[picks.final] : "— make your picks —";

    const allPicked = picks.r1_45 && picks.r1_36 && picks.semi_1 && picks.semi_2 && picks.final;
    const nameFilled = document.getElementById("g-entrant-name").value.trim().length > 0;
    document.getElementById("g-submit-btn").disabled = !(allPicked && nameFilled);
  }

  document.getElementById("g-entrant-name").addEventListener("input", render);

  document.querySelectorAll(".g-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".g-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".g-panel").forEach(p => p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("panel-" + tab.dataset.tab).classList.add("active");
      if (tab.dataset.tab === "leaderboard") loadLeaderboard();
    });
  });

  async function submitBracket() {
    const name = document.getElementById("g-entrant-name").value.trim();
    if (!name) return;
    const key = name.toLowerCase().replace(/\s+/g, "_");
    const statusEl = document.getElementById("g-submit-status");
    statusEl.textContent = "Saving…";
    try {
      const data = await getPoolData();
      data.entries[key] = { name, picks, submittedAt: Date.now() };
      await savePoolData(data);
      statusEl.textContent = "Saved! Your bracket is locked in.";
    } catch (e) {
      statusEl.textContent = "Couldn't save — check your connection and try again.";
    }
  }
  document.getElementById("g-submit-btn").addEventListener("click", submitBracket);

  function scoreEntry(entryPicks, actual) {
    if (!actual || Object.keys(actual).length === 0) return null;
    let pts = 0;
    ["r1_45", "r1_36"].forEach(g => { if (actual[g] && entryPicks[g] === actual[g]) pts += 1; });
    ["semi_1", "semi_2"].forEach(g => { if (actual[g] && entryPicks[g] === actual[g]) pts += 2; });
    if (actual.final && entryPicks.final === actual.final) pts += 4;
    return pts;
  }

  async function loadLeaderboard() {
    const content = document.getElementById("g-lb-content");
    content.innerHTML = "<p class='g-empty'>Loading entries…</p>";
    try {
      const data = await getPoolData();
      const entries = Object.values(data.entries || {});
      if (!entries.length) {
        content.innerHTML = "<p class='g-empty'>No brackets submitted yet. Be the first!</p>";
        return;
      }
      const actual = data.actualResults || {};
      const hasResults = Object.keys(actual).length > 0;
      const scored = entries.map(e => ({ ...e, pts: scoreEntry(e.picks, actual) }));
      if (hasResults) scored.sort((a, b) => (b.pts || 0) - (a.pts || 0));

      let html = `<table class="g-lb-table"><thead><tr>
        <th>Entrant</th><th>4v5</th><th>3v6</th><th>Semi (1)</th><th>Semi (2)</th><th>Champion</th>${hasResults ? "<th>Pts</th>" : ""}
      </tr></thead><tbody>`;
      scored.forEach(e => {
        html += `<tr>
          <td><strong>${e.name}</strong></td>
          <td>${TEAMS[e.picks.r1_45] || "—"}</td>
          <td>${TEAMS[e.picks.r1_36] || "—"}</td>
          <td>${TEAMS[e.picks.semi_1] || "—"}</td>
          <td>${TEAMS[e.picks.semi_2] || "—"}</td>
          <td>${TEAMS[e.picks.final] || "—"}</td>
          ${hasResults ? `<td class="g-pts">${e.pts ?? "—"}</td>` : ""}
        </tr>`;
      });
      html += "</tbody></table>";
      if (!hasResults) html += "<p class='g-status' style='margin-top:14px;'>Scores will appear once the commissioner enters real results.</p>";
      content.innerHTML = html;
    } catch (e) {
      content.innerHTML = "<p class='g-empty'>Couldn't load entries — check your connection.</p>";
    }
  }

  function adminSelect(gameId, options, label) {
    const wrap = document.createElement("div");
    wrap.style.marginBottom = "10px";
    wrap.innerHTML = `<label style="font-family:'Space Mono',monospace;font-size:11px;display:block;margin-bottom:4px;">${label}</label>`;
    const sel = document.createElement("select");
    sel.style.cssText = "font-family:'Inter',sans-serif;font-size:13px;padding:8px;border-radius:6px;border:1.5px solid var(--line);width:100%;max-width:280px;";
    sel.innerHTML = `<option value="">— not decided —</option>` + options.map(s => `<option value="${s}">${TEAMS[s]}</option>`).join("");
    sel.dataset.game = gameId;
    wrap.appendChild(sel);
    return { wrap, sel };
  }

  async function buildAdmin() {
    const body = document.getElementById("g-admin-body");
    let actual = {};
    try {
      const data = await getPoolData();
      actual = data.actualResults || {};
    } catch (e) {}
    body.innerHTML = "";
    const fields = [
      adminSelect("r1_45", [4, 5], "Round 1: 6 Aces vs Old Fashioned — winner"),
      adminSelect("r1_36", [3, 6], "Round 1: Swingers vs Frozen Flock — winner"),
      adminSelect("semi_1", [1, 4, 5], "Semi: Liquid Mechanix vs (4/5 winner) — winner"),
      adminSelect("semi_2", [2, 3, 6], "Semi: Birdie Brotherhood vs (3/6 winner) — winner"),
      adminSelect("final", [1, 2, 3, 4, 5, 6], "Final — champion")
    ];
    fields.forEach(f => { f.sel.value = actual[f.sel.dataset.game] || ""; body.appendChild(f.wrap); });

    const saveBtn = document.createElement("button");
    saveBtn.className = "g-submit-btn";
    saveBtn.textContent = "Save Results";
    saveBtn.style.background = "var(--fairway)";
    saveBtn.addEventListener("click", async () => {
      const results = {};
      fields.forEach(f => { if (f.sel.value) results[f.sel.dataset.game] = parseInt(f.sel.value, 10); });
      try {
        const data = await getPoolData();
        data.actualResults = results;
        await savePoolData(data);
        saveBtn.textContent = "Saved ✓";
      } catch (e) {
        saveBtn.textContent = "Failed — retry";
      }
      setTimeout(() => (saveBtn.textContent = "Save Results"), 1500);
    });
    body.appendChild(saveBtn);
  }

  // Only show the "setup link created" banner on the very first load that
  // created the pool (i.e. we just redirected here). We detect that via
  // a one-time sessionStorage flag set right before the redirect.
  if (params.get("pool") && sessionStorage.getItem("gisi_just_created") === "1") {
    sessionStorage.removeItem("gisi_just_created");
    showSetupBanner();
  }

  (async function bootstrap() {
    if (!poolId) {
      sessionStorage.setItem("gisi_just_created", "1");
      try {
        await ensurePool(); // will redirect on success
      } catch (e) {
        // showErrorBanner already ran inside ensurePool; nothing else to do
      }
      return;
    }
    render();
    buildAdmin();
  })();
})();
</script>
</body>
</html>
